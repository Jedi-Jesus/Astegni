<div id="adv-signup-modal" class="adv-modal hidden" role="dialog" aria-modal="true" aria-labelledby="adv-signup-title">
    <div class="adv-modal-backdrop" data-close="signup"></div>
    <div class="adv-modal-content">
        <button class="adv-modal-close" data-close="signup" aria-label="Close signup">
            <i class="fas fa-times"></i>
        </button>

        <div class="adv-modal-header">
            <h2 id="adv-signup-title">Create your advertiser account</h2>
            <p>Free. No card required. Verified within 24 hours.</p>
        </div>

        <form id="adv-signup-form" class="adv-form" novalidate>
            <div class="adv-form-row">
                <div class="adv-form-group">
                    <label for="adv-signup-first-name">First name</label>
                    <input type="text" id="adv-signup-first-name" name="first_name"
                           autocomplete="given-name" required placeholder="Jane">
                </div>
                <div class="adv-form-group">
                    <label for="adv-signup-last-name">Last name</label>
                    <input type="text" id="adv-signup-last-name" name="last_name"
                           autocomplete="family-name" required placeholder="Doe">
                </div>
            </div>

            <div class="adv-form-group">
                <label for="adv-signup-company">Company name <span class="adv-form-optional">(optional)</span></label>
                <input type="text" id="adv-signup-company" name="company_name"
                       autocomplete="organization" placeholder="Acme Beverages Ltd.">
            </div>

            <div class="adv-form-group">
                <label for="adv-signup-email">Work email</label>
                <input type="email" id="adv-signup-email" name="email"
                       autocomplete="email" required
                       placeholder="you@yourcompany.com">
            </div>

            <div class="adv-form-group">
                <label for="adv-signup-password">Password</label>
                <div class="adv-password-input">
                    <input type="password" id="adv-signup-password" name="password"
                           autocomplete="new-password" required minlength="8"
                           placeholder="At least 8 characters">
                    <button type="button" class="adv-password-toggle"
                            onclick="advTogglePassword('adv-signup-password')"
                            aria-label="Show password">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <p class="adv-form-hint">8+ characters. Use letters and numbers.</p>
            </div>

            <label class="adv-form-checkbox">
                <input type="checkbox" id="adv-signup-terms" required>
                <span>I agree to the <a href="#" target="_blank">terms of service</a> and <a href="#" target="_blank">privacy policy</a>.</span>
            </label>

            <div class="adv-form-error" id="adv-signup-error" role="alert"></div>

            <button type="submit" class="adv-btn adv-btn-primary adv-btn-full">
                <span class="adv-btn-label">Create account</span>
                <span class="adv-btn-spinner hidden"><i class="fas fa-spinner fa-spin"></i></span>
            </button>

            <p class="adv-form-footer">
                Already have an account?
                <a href="#" onclick="advSwitchAuthModal('login'); return false;">Log in</a>
            </p>
        </form>
    </div>
</div>
