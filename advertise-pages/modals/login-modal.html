<div id="adv-login-modal" class="adv-modal hidden" role="dialog" aria-modal="true" aria-labelledby="adv-login-title">
    <div class="adv-modal-backdrop" data-close="login"></div>
    <div class="adv-modal-content">
        <button class="adv-modal-close" data-close="login" aria-label="Close login">
            <i class="fas fa-times"></i>
        </button>

        <div class="adv-modal-header">
            <h2 id="adv-login-title">Welcome back</h2>
            <p>Log in to manage your campaigns.</p>
        </div>

        <form id="adv-login-form" class="adv-form" novalidate>
            <div class="adv-form-group">
                <label for="adv-login-email">Email</label>
                <input type="email" id="adv-login-email" name="email"
                       autocomplete="email" required
                       placeholder="you@yourcompany.com">
            </div>

            <div class="adv-form-group">
                <label for="adv-login-password">Password</label>
                <div class="adv-password-input">
                    <input type="password" id="adv-login-password" name="password"
                           autocomplete="current-password" required
                           placeholder="Your password">
                    <button type="button" class="adv-password-toggle"
                            onclick="advTogglePassword('adv-login-password')"
                            aria-label="Show password">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="adv-form-error" id="adv-login-error" role="alert"></div>

            <button type="submit" class="adv-btn adv-btn-primary adv-btn-full">
                <span class="adv-btn-label">Log in</span>
                <span class="adv-btn-spinner hidden"><i class="fas fa-spinner fa-spin"></i></span>
            </button>

            <p class="adv-form-footer">
                Don&rsquo;t have an account yet?
                <a href="#" onclick="advSwitchAuthModal('signup'); return false;">Sign up</a>
            </p>
        </form>
    </div>
</div>
