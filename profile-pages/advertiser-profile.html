<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting to advertise.astegni.com</title>
    <meta http-equiv="refresh" content="0; url=https://advertise.astegni.com/advertiser-profile.html">
    <script>
        (function () {
            var host = window.location.hostname;
            var isProd = host === 'astegni.com' || host === 'www.astegni.com';
            var target = isProd
                ? 'https://advertise.astegni.com/advertiser-profile.html'
                : window.location.protocol + '//' + host + (window.location.port ? ':' + window.location.port : '') + '/advertise-pages/advertiser-profile.html';
            window.location.replace(target);
        })();
    </script>
</head>
<body style="font-family: sans-serif; padding: 2rem; text-align: center;">
    <h1>This page has moved</h1>
    <p>Advertiser profiles now live at
        <a href="https://advertise.astegni.com/advertiser-profile.html">advertise.astegni.com</a>.</p>
</body>
</html>
